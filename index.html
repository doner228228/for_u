<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>С Днём Рождения, Любимый!</title>

<!-- Шрифт Hello Kitty -->
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
}

body {
    min-height: 100vh;
    background: linear-gradient(145deg, #ffe6f0 0%, #ffccde 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Comic Neue', 'Quicksand', system-ui, -apple-system, sans-serif;
    padding: 20px;
    position: relative;
    overflow-x: hidden;
    cursor: default;
}

/* Карточка */
.card {
    max-width: 600px;
    width: 100%;
    background: rgba(255, 245, 248, 0.96);
    backdrop-filter: blur(2px);
    border-radius: 65px 65px 80px 80px;
    box-shadow: 0 30px 40px rgba(255, 182, 193, 0.3), 0 0 0 12px #fff8, 0 0 0 16px #ffb7c7;
    padding: 35px 25px 50px;
    text-align: center;
    transition: transform 0.3s ease;
    z-index: 10;
    animation: float 3s infinite ease-in-out;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0px); }
}

/* Главная сердечко */
.heart-container { margin-bottom: 20px; position: relative; display: inline-block; }
.main-heart {
    font-size: 120px;
    display: inline-block;
    animation: heartbeat 1.2s infinite ease-in-out;
    filter: drop-shadow(0 10px 15px rgba(255, 105, 180, 0.4));
    cursor: pointer;
    transition: transform 0.1s;
    color: #ff4d6d;
}
@keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.18); text-shadow: 0 0 12px #ffb7c7; }
}

h1 { font-size: 2.5rem; color: #c94f7c; font-weight: 700; letter-spacing: -0.5px; margin: 15px 0 10px; text-shadow: 2px 2px 0 #ffe0ed; }
.greeting { font-size: 1.4rem; color: #b23b66; background: #fff0f5dd; padding: 12px 24px; border-radius: 100px; display: inline-block; margin: 15px 0; font-weight: 700; backdrop-filter: blur(4px); box-shadow: inset 0 1px 2px #fff9, 0 4px 8px #ffb7c7; }

/* Таймер */
.timer-container { background: #ffffffcc; border-radius: 60px; padding: 12px 16px; margin: 15px 0 10px; backdrop-filter: blur(4px); border: 1px solid #ffbfd5; }
.timer-label { font-size: 0.9rem; color: #b3446c; letter-spacing: 1px; font-weight: 700; }
.timer { font-size: 1.9rem; font-weight: 800; font-family: monospace; color: #c94f7c; background: #fff0f5; display: inline-block; padding: 8px 20px; border-radius: 50px; margin-top: 8px; letter-spacing: 3px; box-shadow: inset 0 0 0 1px #ffe0ed, 0 4px 12px rgba(0,0,0,0.05); }

/* Кнопка бантик */
.surprise-btn {
    background: #ff80a5;
    border: none;
    color: white;
    font-size: 1.3rem;
    font-weight: bold;
    padding: 14px 28px;
    border-radius: 60px;
    cursor: pointer;
    transition: 0.2s;
    margin-top: 15px;
    margin-bottom: 20px;
    font-family: inherit;
    box-shadow: 0 8px 0 #b13b62;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}
.surprise-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #b13b62; }

/* Конверт */
.envelope-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 15px; margin-bottom: 5px; width: 100%; }
.envelope { position: relative; width: 280px; height: 170px; background: #ff99bb; border-radius: 0 0 20px 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: all 0.4s ease; cursor: pointer; margin: 0 auto; }
.envelope:before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #ffb7ce; border-radius: 0 0 20px 20px; z-index: 2; }

.envelope .letter { position: absolute; bottom: 0; left: 10%; width: 80%; background: #fffef7; padding: 16px 12px; border-radius: 12px 12px 8px 8px; font-size: 0.75rem; color: #b23b66; text-align: center; transition: all 0.4s ease; opacity: 0; transform: translateY(30px); pointer-events: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1); font-weight: 500; max-height: 150px; overflow-y: auto; line-height: 1.4; z-index: 5; }
.envelope.open .letter { opacity: 1; transform: translateY(-20px); pointer-events: auto; }
.open-hint { font-size: 0.7rem; color: #c94f7c; margin-top: 8px; opacity: 0.8; text-align: center; }
.signature { margin-top: 28px; font-size: 0.95rem; color: #e36f99; font-weight: 600; letter-spacing: 0.5px; }

/* Холст с сердечками */
#hearts-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

@media (max-width: 550px) {
    .card { padding: 25px 18px 35px; }
    .main-heart { font-size: 90px; }
    h1 { font-size: 1.8rem; }
    .timer { font-size: 1.4rem; letter-spacing: 2px; }
    .envelope { width: 240px; height: 150px; }
    .letter-text { font-size: 0.7rem; }
    .greeting { font-size: 1.2rem; padding: 10px 20px; }
}
</style>
</head>
<body>

<canvas id="hearts-canvas"></canvas>

<div class="card">
    <div class="heart-container">
        <div class="main-heart">❤️</div>
    </div>
    <h1>С Днём Рождения, Любимый!</h1>
    <div class="greeting">Ты мое самое большое счастье 💕</div>

    <div class="timer-container">
        <div class="timer-label">До твоего дня</div>
        <div class="timer" id="countdown">00:00:00</div>
    </div>

    <button class="surprise-btn" id="openBtn">🎀 Открыть конверт</button>

    <div class="envelope-wrapper">
        <div class="envelope" id="envelope">
            <div class="flap"></div>
            <div class="letter" id="letter">
                Дорогой, пусть каждый день приносит радость и улыбки. 
                Ты самый лучший! 😘
                <div class="signature">С любовью, твоя Kitty 💖</div>
            </div>
        </div>
        <div class="open-hint">Нажми на конверт</div>
    </div>
</div>

<audio id="cuteSound" src="https://www.soundjay.com/button/beep-07.mp3" preload="auto"></audio>

<script>
// Таймер
function updateTimer() {
    const now = new Date();
    const birthday = new Date(now.getFullYear(), 11, 24, 0, 0, 0); // пример 24 декабря
    if (now > birthday) birthday.setFullYear(birthday.getFullYear() + 1);
    const diff = birthday - now;
    const hrs = String(Math.floor(diff / 1000 / 60 / 60) % 24).padStart(2, '0');
    const mins = String(Math.floor(diff / 1000 / 60) % 60).padStart(2, '0');
    const secs = String(Math.floor(diff / 1000) % 60).padStart(2, '0');
    document.getElementById('countdown').textContent = ${hrs}:${mins}:${secs};
}
setInterval(updateTimer, 1000);
updateTimer();

// Конверт
const envelope = document.getElementById('envelope');
const letter = document.getElementById('letter');
const openBtn = document.getElementById('openBtn');
const cuteSound = document.getElementById('cuteSound');

function openEnvelope() {
    envelope.classList.add('open');
    cuteSound.play();
}
openBtn.addEventListener('click', openEnvelope);
envelope.addEventListener('click', openEnvelope);

// Сердечки на фоне
const canvas = document.getElementById('hearts-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const hearts = [];
function createHeart() {
    hearts.push({
        x: Math.random() * canvas.width,
        y: canvas.height + 10,
        size: Math.random() * 12 + 8,
        speed: Math.random() * 1 + 0.5,
        color: rgba(${255}, ${182}, ${193}, ${Math.random()})
    });
}
for (let i = 0; i < 40; i++) createHeart();

</body>
</html>
